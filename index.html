<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tod">
<title>Tod — Project Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito Sans',sans-serif;background:#f5f5f3;color:#1a1a1a;-webkit-font-smoothing:antialiased}
.app{max-width:1200px;margin:0 auto;padding:16px;padding-bottom:100px}
.header{display:flex;align-items:center;gap:14px;padding-bottom:16px;border-bottom:1px solid #ddd}
.logo{width:48px;height:48px;border-radius:14px;background:#085041;cursor:pointer;flex-shrink:0;overflow:hidden;padding:0}.logo img{width:100%;height:100%;object-fit:cover;display:block}
.header-text{flex:1}
.header-text h1{font-size:19px;font-weight:700;cursor:pointer}
.header-text p{font-size:13px;color:#888;margin-top:2px}
.header-right{text-align:right;font-size:12px;color:#888}
.header-right b{color:#1a1a1a;display:block;margin-top:2px}
.breadcrumb{display:flex;align-items:center;gap:6px;padding:12px 0;flex-wrap:wrap}
.breadcrumb span{font-size:13px;cursor:pointer;color:#085041;font-weight:600}
.breadcrumb span.current{color:#1a1a1a;cursor:default}
.breadcrumb .sep{color:#aaa;font-size:12px;cursor:default}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0}
.kpi{background:#fff;border-radius:12px;padding:18px 20px}
.kpi label{font-size:13px;color:#888;display:block;margin-bottom:8px}
.kpi .val{font-size:26px;font-weight:700}
.search-box{position:relative;margin-bottom:14px}
.search-box input{width:100%;padding:13px 16px 13px 44px;border:1.5px solid #ddd;border-radius:12px;font-size:15px;font-family:inherit;outline:none;background:#fff}
.search-box input:focus{border-color:#085041}
.search-box svg{position:absolute;left:15px;top:16px;opacity:.35}
.search-box .clear{position:absolute;right:12px;top:10px;background:none;border:none;font-size:22px;color:#888;cursor:pointer;padding:4px}
.pills{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.pill{padding:9px 18px;border:1.5px solid #ddd;border-radius:24px;font-size:13px;font-family:inherit;cursor:pointer;background:transparent;color:#888;font-weight:400;white-space:nowrap}
.pill.active{font-weight:600}
.controls{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;flex-wrap:wrap}
.tab-bar{display:flex;background:#eee;border-radius:10px;padding:3px}
.tab-bar button{padding:8px 20px;border:none;border-radius:8px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;background:transparent;color:#888}
.tab-bar button.active{background:#fff;color:#1a1a1a;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.sort-btn{padding:9px 16px;border:1px solid #ddd;border-radius:10px;font-size:12px;font-family:inherit;cursor:pointer;background:#fff;color:#1a1a1a;font-weight:500}
.clear-btn{font-size:12px;color:#A32D2D;background:#FCEBEB;border:none;border-radius:20px;padding:7px 16px;cursor:pointer;font-family:inherit;font-weight:600}
.sort-menu{position:absolute;right:0;top:calc(100% + 4px);background:#fff;border:1px solid #ccc;border-radius:12px;padding:6px;z-index:100;min-width:210px;box-shadow:0 8px 24px rgba(0,0,0,.12)}
.sort-menu button{display:block;width:100%;text-align:left;padding:11px 14px;border:none;border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer;background:transparent;color:#1a1a1a}
.sort-menu button.active{background:#f0f0ee;color:#085041;font-weight:600}
.mgr-card{background:#fff;border:1px solid #e5e5e3;border-radius:14px;padding:18px 22px;cursor:pointer;margin-bottom:10px;transition:transform .15s}
.mgr-card:active{transform:scale(.98)}
.mgr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.mgr-info{display:flex;align-items:center;gap:12px}
.mgr-avatar{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px}
.mgr-name{font-size:15px;font-weight:600}
.mgr-sub{font-size:12px;color:#888;margin-top:2px}
.mgr-pct{font-size:24px;font-weight:700;text-align:right}
.mgr-pct small{font-size:11px;color:#888;display:block;font-weight:400;margin-top:2px}
.progress-bar{height:8px;background:#eee;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .5s}
.pkg-card{background:#fff;border:1px solid #e5e5e3;border-radius:12px;padding:15px 18px;cursor:pointer;margin-bottom:6px}
.pkg-card:active{transform:scale(.98)}
.pkg-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.pkg-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pkg-meta{font-size:12px;color:#888;margin-top:2px}
.pkg-pct{font-size:20px;font-weight:700;flex-shrink:0;margin-left:12px}
.sub-header{font-size:14px;font-weight:600;color:#888;margin-bottom:8px;margin-top:16px}
.csr-label{margin-top:8px;font-size:12px;color:#085041;font-weight:600}
.empty-state{text-align:center;padding:40px;color:#888}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state h3{font-size:16px;font-weight:600;margin-bottom:6px;color:#1a1a1a}
.summary{margin-top:24px;padding:16px 20px;background:#fff;border-radius:12px}
.summary h4{font-size:13px;font-weight:600;margin-bottom:10px}
.summary-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee;font-size:13px}
.summary-row .label{color:#888}
.summary-row .value{font-weight:600}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:1px solid #ddd;border-radius:10px;font-size:14px;font-family:inherit;cursor:pointer;background:#fff;color:#1a1a1a;font-weight:600;margin-bottom:16px}
.sheet-wrap{position:relative;border:2px solid #505050;border-radius:4px;overflow:hidden}
.sheet-scroll{overflow-x:auto;overflow-y:auto;max-height:70vh;-webkit-overflow-scrolling:touch}
.sheet-scroll table{border-collapse:separate;border-spacing:0;font-size:11px;font-family:'Courier New',monospace;table-layout:fixed}
.sheet-scroll th,.sheet-scroll td{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sheet-scroll thead th{position:sticky;top:0;z-index:20;color:#fff;font-weight:600;padding:8px 10px;text-align:center;letter-spacing:.3px;border-bottom:2px solid #505050;border-right:1px solid rgba(255,255,255,.2)}
.sheet-scroll thead tr:nth-child(2) th{top:32px;font-size:9px;font-weight:500}
.frozen-item{position:sticky!important;left:0!important;z-index:25!important}
.frozen-desc{position:sticky!important;left:80px!important;z-index:25!important;box-shadow:4px 0 8px -2px rgba(0,0,0,.2)!important}
.frozen-corner{z-index:35!important}
.sheet-scroll td{padding:6px 12px;text-align:right;border-bottom:1px solid #c0c0c0;border-right:1px solid #c0c0c0;font-size:11px;color:#1a1a1a}
.sheet-scroll td.col-total{font-weight:700;border-right:2px solid #505050}
.sheet-scroll td.frozen-item,.sheet-scroll td.frozen-desc{text-align:left}
.sheet-scroll tr.row-group{background:#dceeda!important}
.sheet-scroll tr.row-group td{font-weight:700;border-bottom:2px solid #808080}
.sheet-scroll tr.row-total{background:#e8e4da!important}
.sheet-scroll tr.row-total td{font-weight:700;font-size:12px;border-bottom:2px solid #505050}
.sheet-scroll tr.row-total td.col-total{background:#ddd8cc}
.sheet-scroll tr.row-group td.col-total{background:#cee6cc}
.sheet-scroll tr:nth-child(even):not(.row-group):not(.row-total){background:#f7f7f5}
.sheet-scroll tr:nth-child(odd):not(.row-group):not(.row-total){background:#ffffff}
td.over-budget{color:#A32D2D!important;font-weight:700!important}
.section-pills{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.section-pills button{padding:6px 14px;border:1px solid #ddd;border-radius:20px;font-size:11px;font-family:inherit;cursor:pointer;background:transparent;color:#888;font-weight:400}
.section-pills button.active{border-color:#085041;background:#08504114;color:#085041;font-weight:600}
.collapse-toggle{display:inline-block;width:16px;font-size:10px;color:#888;cursor:pointer;text-align:center}
.sheet-info{margin-top:8px;font-size:11px;color:#888}
.chat-fab{position:fixed;bottom:24px;right:24px;width:60px;height:60px;border-radius:50%;background:#085041;border:none;cursor:pointer;z-index:200;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.25);transition:transform .2s;overflow:hidden;padding:0}
.chat-fab:active{transform:scale(.92)}
.chat-fab img{width:100%;height:100%;object-fit:cover}
.chat-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.chat-backdrop.open{opacity:1;pointer-events:auto}
.chat-panel{position:fixed;bottom:0;left:0;right:0;max-width:600px;margin:0 auto;height:75vh;max-height:680px;background:#fff;border-radius:20px 20px 0 0;z-index:301;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,.37,1.12);display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,.15)}
.chat-panel.open{transform:translateY(0)}
.chat-handle{width:40px;height:4px;border-radius:2px;background:#ccc;margin:10px auto 0}
.chat-head{display:flex;align-items:center;gap:10px;padding:12px 20px;border-bottom:1px solid #eee;flex-shrink:0}
.chat-head .av{width:32px;height:32px;border-radius:50%;background:#085041;overflow:hidden;padding:0}.chat-head .av img{width:100%;height:100%;object-fit:cover;display:block}
.chat-head .info{flex:1}
.chat-head .info h3{font-size:15px;font-weight:700}
.chat-head .info p{font-size:11px;color:#888}
.chat-head .close-btn{width:32px;height:32px;border-radius:50%;border:none;background:#f0f0ee;cursor:pointer;font-size:18px;color:#888;display:flex;align-items:center;justify-content:center}
.chat-msgs{flex:1;overflow-y:auto;padding:16px 20px;-webkit-overflow-scrolling:touch}
.chat-msg{margin-bottom:14px;display:flex;gap:8px}
.chat-msg.user{flex-direction:row-reverse}
.chat-msg .bubble{max-width:85%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.55;white-space:pre-wrap}
.chat-msg.user .bubble{background:#085041;color:#fff;border-bottom-right-radius:4px}
.chat-msg.bot .bubble{background:#f0f0ee;color:#1a1a1a;border-bottom-left-radius:4px}
.chat-msg .bot-av{width:24px;height:24px;border-radius:50%;background:#085041;overflow:hidden;flex-shrink:0;margin-top:2px;padding:0}.chat-msg .bot-av img{width:100%;height:100%;object-fit:cover;display:block}
.chat-suggestions{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.chat-suggestions button{padding:8px 14px;border:1px solid #ddd;border-radius:20px;font-size:12px;font-family:inherit;cursor:pointer;background:#fff;color:#1a1a1a;text-align:left;line-height:1.3}
.chat-suggestions button:active{background:#f0f0ee}
.chat-input-bar{display:flex;gap:8px;padding:12px 16px;border-top:1px solid #eee;flex-shrink:0;background:#fff}
.chat-input-bar textarea{flex:1;border:1.5px solid #ddd;border-radius:12px;padding:10px 14px;font-size:14px;font-family:inherit;resize:none;outline:none;line-height:1.4;max-height:80px}
.chat-input-bar textarea:focus{border-color:#085041}
.chat-input-bar .send{width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.typing-dots{display:flex;gap:4px;align-items:center;padding:8px 0}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:#aaa;animation:blink 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.setup-overlay{position:fixed;inset:0;background:rgba(8,80,65,.92);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.setup-card{background:#fff;border-radius:20px;padding:32px;max-width:420px;width:100%;text-align:center}
.setup-card .tod-logo{width:60px;height:60px;border-radius:16px;background:#085041;overflow:hidden;margin:0 auto 16px;padding:0}.setup-card .tod-logo img{width:100%;height:100%;object-fit:cover;display:block}
.setup-card h2{font-size:20px;font-weight:700;margin-bottom:6px}
.setup-card p{font-size:13px;color:#666;margin-bottom:20px;line-height:1.5}
.setup-card input{width:100%;padding:12px 16px;border:1.5px solid #ddd;border-radius:10px;font-size:14px;font-family:inherit;outline:none;margin-bottom:8px}
.setup-card input:focus{border-color:#085041}
.setup-card .hint{font-size:11px;color:#888;margin-bottom:16px;text-align:left}
.setup-card .hint a{color:#085041}
.setup-card button.primary{width:100%;padding:13px;background:#085041;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer}
.setup-card button.primary:active{background:#0a6b55}
.key-bar{display:flex;align-items:center;gap:6px;padding:6px 12px 0}
.key-bar span{font-size:10px;color:#aaa;flex:1}
.key-bar button{font-size:10px;color:#A32D2D;background:none;border:none;cursor:pointer;font-family:inherit;padding:2px}
@media(max-width:768px){.kpis{grid-template-columns:1fr 1fr}.kpi .val{font-size:20px}.mgr-pct{font-size:20px}.chat-panel{max-width:100%}}
</style>
</head>

function ChatPanel({open,onClose,apiKey}){

  useEffect(()=>{if(open)setTimeout(()=>inputRef.current?.focus(),400);},[open]);
  const send=async(text)=>{
    const msg=text||input.trim();if(!msg||loading)return;setInput("");
    const newMsgs=[...msgs,{role:"user",content:msg}];setMsgs(newMsgs);setLoading(true);
    try{
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
        {method:"POST",headers:{"Content-Type":"application/json"},
         body:JSON.stringify({system_instruction:{parts:[{text:SYS_PROMPT}]},contents:newMsgs.map(m=>({role:m.role==="assistant"?"model":"user",parts:[{text:m.content}]})),generationConfig:{maxOutputTokens:1000}})});
      const data=await res.json();if(data.error)throw new Error(data.error.message);
      const reply=data.candidates?.[0]?.content?.parts?.map(p=>p.text).join("\n")||"Sorry, I couldn't process that.";

  };
  const onKey=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}};

  const aC=useMemo(()=>{let c=0;MANAGERS.forEach(m=>m.projects.forEach(p=>p.subs.forEach(s=>{if(s.pct>0&&s.pct<1)c++;})));return c;},[]);
  const sC=useMemo(()=>{const c={es:0,ip:0,ot:0,nd:0};allPkgs.forEach(s=>c[ss(s.pct)]++);return c;},[allPkgs]);
  const hasF=sortBy!=="ch"||stage!=="all"||search;
  const fab=(<button className="chat-fab" onClick={()=>setChatOpen(true)}><img src={MASCOT_IMG} alt="Ask Tod"/></button>);
  if(showCSR)return <div className="app"><Sheet onBack={()=>setShowCSR(false)}/>{fab}<ChatPanel open={chatOpen} onClose={()=>setChatOpen(false)} apiKey={apiKey}/></div>;
  return(
    <div className="app">
      <div className="header">
        <div className="logo" onClick={goHome}><img src={MASCOT_IMG} alt="TACC"/></div>
        <div className="header-text"><h1 onClick={goHome}>Tod</h1><p>Project portfolio dashboard</p></div>
        <div className="header-right"><span>TERP New Projects</span><b>March 2026</b></div>
      </div>
      {level>0&&<div className="breadcrumb"><span onClick={goHome}>All Projects</span>{path.map((p,i)=><React.Fragment key={i}><span className="sep">›</span><span className={i===path.length-1?"current":""} onClick={()=>i<path.length-1&&goTo(i)}>{p.name||p.mgr}</span></React.Fragment>)}</div>}
      {level===0&&<div>
        <div className="kpis"><div className="kpi"><label>Gross contract</label><div className="val">{f(TC)}</div></div><div className="kpi"><label>Active packages</label><div className="val">{aC}</div></div><div className="kpi"><label>Weighted progress</label><div className="val" style={{color:"#085041"}}>{(wP*100).toFixed(1)}%</div></div></div>
        <div className="search-box"><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search manager, project, or package..."/><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>{search&&<button className="clear" onClick={()=>setSearch("")}>×</button>}</div>
        <div className="pills">{STAGES.map(s=>{const a=stage===s.k;const ct=s.k==="all"?allPkgs.length:sC[s.k]||0;return <button key={s.k} className={"pill"+(a?" active":"")} style={a?{borderColor:s.c,background:s.c+"14",color:s.c}:{}} onClick={()=>setStage(stage===s.k&&s.k!=="all"?"all":s.k)}>{s.l} ({ct})</button>;})}</div>
        <div className="controls"><div className="tab-bar"><button className={view==="managers"?"active":""} onClick={()=>setView("managers")}>By manager</button><button className={view==="packages"?"active":""} onClick={()=>setView("packages")}>All packages</button></div><div style={{display:"flex",gap:8,alignItems:"center"}}>{hasF&&<button className="clear-btn" onClick={()=>{setSortBy("ch");setStage("all");setSearch("");}}>Clear</button>}<div style={{position:"relative"}}><button className="sort-btn" onClick={()=>setShowSort(!showSort)}>{SORTS.find(o=>o.k===sortBy)?.l} ▾</button>{showSort&&<><div onClick={()=>setShowSort(false)} style={{position:"fixed",inset:0,zIndex:99}}/><div className="sort-menu">{SORTS.map(o=><button key={o.k} className={sortBy===o.k?"active":""} onClick={()=>{setSortBy(o.k);setShowSort(false);}}>{o.l}</button>)}</div></>}</div></div></div>
        {view==="managers"&&<div>{fM.map(m=><div key={m.id} className="mgr-card" onClick={()=>nav(m)}><div className="mgr-row"><div className="mgr-info"><div className="mgr-avatar" style={{background:sc(m.wPct)+"18",color:sc(m.wPct)}}>{m.mgr.split(" ").map(w=>w[0]).join("")}</div><div><div className="mgr-name">{m.mgr}</div><div className="mgr-sub">{m.count} pkg{m.count>1?"s":""} · {f(m.totalC)}</div></div></div><div className="mgr-pct" style={{color:sc(m.wPct)}}>{(m.wPct*100).toFixed(0)}%<small>{sl(m.wPct)}</small></div></div><div className="progress-bar"><div className="progress-fill" style={{width:pb(m.wPct)+"%",background:sc(m.wPct)}}/></div></div>)}</div>}
        {view==="packages"&&<div>{fP.map((s,i)=><div key={s.id+i} className="pkg-card" onClick={()=>{const m=MANAGERS.find(x=>x.id===s.mi);if(m)nav({...m,...ms(m)});}}><div className="pkg-row"><div style={{flex:1,minWidth:0}}><div className="pkg-name">{s.name}</div><div className="pkg-meta">{s.mn} · {s.pn}{s.contract>0&&" · "+f(s.contract)}</div></div><div className="pkg-pct" style={{color:sc(s.pct)}}>{(s.pct*100).toFixed(1)}%</div></div><div className="progress-bar" style={{height:6}}><div className="progress-fill" style={{width:pb(s.pct)+"%",background:sc(s.pct)}}/></div></div>)}</div>}
        <div className="summary"><h4>Portfolio summary</h4>{[["Gross contract",f(TC)],["5% Tax",f(250130454.344)],["After tax",f(4752478632.536)],["15% Target profit",f(750391363.032)],["Target direct cost",f(4002087269.504)]].map(([l,v],i)=><div key={i} className="summary-row"><span className="label">{l}</span><span className="value">{v}</span></div>)}</div>
        <div className="key-bar"><span>AI: Gemini 2.5 Flash · key ending …{apiKey.slice(-6)}</span><button onClick={()=>{localStorage.removeItem("tod_gemini_key");setApiKey("");}}>Change key</button></div>
      </div>}
      {level===1&&current&&<div><div style={{margin:"16px 0 20px"}}><h2 style={{fontSize:18}}>{current.mgr}</h2><p style={{fontSize:13,color:"#888",marginTop:4}}>Total contract: {f(current.contract)}</p></div>{current.projects.map(p=><div key={p.id}><div className="sub-header">{p.name}</div>{p.subs.map(s=><div key={s.id} className="pkg-card" onClick={()=>{if(s.hasCSR)setShowCSR(true);else nav({...s,parentProject:p.name});}}><div className="pkg-row"><div><div className="pkg-name">{s.name}</div><div className="pkg-meta">{f(s.contract)}</div></div><div className="pkg-pct" style={{color:sc(s.pct),fontSize:24}}>{(s.pct*100).toFixed(1)}%</div></div><div className="progress-bar"><div className="progress-fill" style={{width:pb(s.pct)+"%",background:sc(s.pct)}}/></div>{s.hasCSR&&<div className="csr-label">📊 Open detailed Cost Status Report</div>}</div>)}</div>)}</div>}
      {level===2&&current&&!showCSR&&<div className="empty-state"><div className="icon">📋</div><h3>Detailed CSR not yet available</h3><p>{(current.pct*100).toFixed(1)}% complete · {f(current.contract)}</p></div>}
      {fab}
      <ChatPanel open={chatOpen} onClose={()=>setChatOpen(false)} apiKey={apiKey}/>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
